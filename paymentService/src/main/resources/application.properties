spring.application.name=paymentService
server.port=8085

# ===================================================================
# EUREKA SERVICE DISCOVERY CONFIGURATION
# ===================================================================
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=30

# ===================================================================
# DATABASE CONFIGURATION - PostgreSQL
# ===================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/database
spring.datasource.username=root
spring.datasource.password=Arcana
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ===================================================================
# JWT SECURITY CONFIGURATION
# ===================================================================
jwt.secret=mysupersecretkeymysupersecretkey12345
jwt.expiration=3600000

# ===================================================================
# DISTRIBUTED CACHING - REDIS CONFIGURATION
# ===================================================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0
spring.cache.type=redis
spring.cache.redis.time-to-live=600000
spring.cache.redis.cache-null-values=false

# ===================================================================
# RABBITMQ MESSAGING CONFIGURATION
# ===================================================================
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.initial-interval=1000ms

# ===================================================================
# RAZORPAY PAYMENT GATEWAY CONFIGURATION
# ===================================================================
razorpay.key.id=rzp_test_your_key_id
razorpay.key.secret=your_razorpay_secret

# ===================================================================
# DISTRIBUTED TRACING CONFIGURATION
# ===================================================================
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]

# ===================================================================
# ACTUATOR ENDPOINTS CONFIGURATION
# ===================================================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus,caches,loggers
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true

# ===================================================================
# LOGGING CONFIGURATION
# ===================================================================
logging.level.com.smartSure.paymentService=INFO
logging.level.org.springframework.cache=DEBUG
logging.level.org.springframework.data.redis=DEBUG
logging.level.org.springframework.amqp=DEBUG
