version: '3.9'

services:
  # -------------------- Databases & Messaging --------------------
  mysql:
    image: mysql:8
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: Arcana
      MYSQL_DATABASE: database
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"

  # -------------------- Config Server --------------------
  config-server-smart-sure:
    build: ./CONFIG-SERVER-SMART-SURE
    container_name: config-server-smart-sure
    ports:
      - "8888:8888"
    depends_on:
      - mysql

  # -------------------- Eureka / Service Registry --------------------
  service-registry-smart-sure:
    build: ./ServiceRegistrySmartSure
    container_name: service-registry-smart-sure
    ports:
      - "8761:8761"
    depends_on:
      - config-server-smart-sure

  # -------------------- API Gateway --------------------
  api-gateway-smartsure:
    build: ./ApiGatewaySmartSure
    container_name: api-gateway-smartsure
    ports:
      - "8080:8080"
    depends_on:
      - service-registry-smart-sure

  # -------------------- Microservices --------------------
  auth-service:
    build: ./AuthService
    container_name: auth-service
    ports:
      - "8081:8081"
    depends_on:
      - service-registry-smart-sure
      - mysql
      - redis
      - rabbitmq

  policy-service:
    build: ./PolicyService
    container_name: policy-service
    ports:
      - "8082:8082"
    depends_on:
      - service-registry-smart-sure
      - mysql
      - redis
      - rabbitmq

  claim-service:
    build: ./ClaimService
    container_name: claim-service
    ports:
      - "8083:8083"
    depends_on:
      - service-registry-smart-sure
      - mysql
      - redis
      - rabbitmq

  admin-service:
    build: ./AdminService
    container_name: admin-service
    ports:
      - "8084:8084"
    depends_on:
      - service-registry-smart-sure
      - mysql
      - redis
      - rabbitmq

  # -------------------- Zipkin --------------------
  zipkin:
    image: openzipkin/zipkin:2.27
    container_name: zipkin
    ports:
      - "9411:9411"

  # -------------------- Prometheus --------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  # -------------------- Grafana --------------------
  grafana:
    image: grafana/grafana:10.2.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

# -------------------- Volumes --------------------
volumes:
  mysql-data: