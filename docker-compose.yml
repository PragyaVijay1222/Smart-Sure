version: '3.9'

services:
  # -------------------- Databases & Messaging --------------------
  mysql:
    image: mysql:8
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: Arcana
      MYSQL_DATABASE: database
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------- Config Server --------------------
  config-server-smart-sure:
    build: ./config-server-smart-sure
    container_name: config-server-smart-sure
    environment:
      - JAVA_OPTS=-Xmx256m -Xms256m
    ports:
      - "8888:8888"
    depends_on:
      mysql:
        condition: service_healthy
    restart: always

  # -------------------- Eureka / Service Registry --------------------
  service-registry-smart-sure:
    build: ./ServiceRegistrySmartSure
    container_name: service-registry-smart-sure
    environment:
      - JAVA_OPTS=-Xmx256m -Xms256m
    ports:
      - "8761:8761"
    depends_on:
      config-server-smart-sure:
        condition: service_started
    restart: always

  # -------------------- API Gateway --------------------
  api-gateway-smartsure:
    build: ./ApiGatewaySmartSure
    container_name: api-gateway-smartsure
    environment:
      - JAVA_OPTS=-Xmx256m -Xms256m
    ports:
      - "8080:8080"
    depends_on:
      service-registry-smart-sure:
        condition: service_started
    restart: always

  # -------------------- Microservices --------------------
  auth-service:
    build: ./AuthService
    container_name: auth-service
    environment:
      - JAVA_OPTS=-Xmx256m -Xms256m
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      service-registry-smart-sure:
        condition: service_started
    restart: always

  policy-service:
    build: ./PolicyService
    container_name: policy-service
    environment:
      - JAVA_OPTS=-Xmx256m -Xms256m
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      service-registry-smart-sure:
        condition: service_started
    volumes:
      - ./PolicyService/target/PolicyService-0.0.1-SNAPSHOT.jar:/app/app.jar
    restart: always

  payment-service:
    build: ./paymentService
    container_name: payment-service
    environment:
      - JAVA_OPTS=-Xmx256m -Xms256m
    ports:
      - "8085:8085"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      service-registry-smart-sure:
        condition: service_started
    volumes:
      - ./paymentService/target/paymentService-0.0.1-SNAPSHOT.jar:/app/app.jar
    restart: always

  claim-service:
    build: ./claimService
    container_name: claim-service
    environment:
      - JAVA_OPTS=-Xmx256m -Xms256m
    ports:
      - "8083:8083"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      service-registry-smart-sure:
        condition: service_started
    volumes:
      - ./claimService/target/claimService-0.0.1-SNAPSHOT.jar:/app/app.jar
    restart: always

  admin-service:
    build: ./adminService
    container_name: admin-service
    environment:
      - JAVA_OPTS=-Xmx256m -Xms256m
    ports:
      - "8084:8084"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      service-registry-smart-sure:
        condition: service_started
    volumes:
      - ./adminService/target/adminService-0.0.1-SNAPSHOT.jar:/app/app.jar
    restart: always

